{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<style>
    .olms-auth-wrapper {
        min-height: calc(100vh - 120px);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .olms-auth-card {
        border-radius: 18px;
        overflow: hidden;
        border: none;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.18);
        position: relative;
    }

    .olms-auth-header {
        position: relative;
        background: linear-gradient(135deg, #4f46e5, #0ea5e9);
        padding: 22px 18px;
    }

    .olms-auth-header::after {
        content: "";
        position: absolute;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        border: 1px solid rgba(248, 250, 252, 0.3);
        right: -40px;
        top: -60px;
        opacity: 0.7;
    }

    .olms-auth-header h4 {
        font-weight: 600;
        letter-spacing: 0.03em;
    }

    .olms-auth-subtitle {
        font-size: 0.8rem;
        opacity: 0.8;
    }

    .olms-auth-body {
        padding: 22px 22px 20px;
        background: linear-gradient(180deg, #f9fafb, #eef2ff);
    }

    .olms-form-label {
        font-size: 0.86rem;
        font-weight: 500;
        color: #4b5563;
        margin-bottom: 4px;
    }

    .olms-form-control {
        border-radius: 10px;
        border-color: #d1d5db;
        font-size: 0.9rem;
        padding: 9px 11px;
        transition: border-color 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
        background-color: rgba(255, 255, 255, 0.95);
    }

    .olms-form-control:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.23);
        background-color: #ffffff;
    }

    .olms-auth-btn {
        border-radius: 999px;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        font-size: 0.78rem;
        padding: 9px 12px;
        background: linear-gradient(135deg, #4f46e5, #0ea5e9);
        border: none;
        box-shadow: 0 10px 18px rgba(37, 99, 235, 0.35);
        transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    .olms-auth-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 28px rgba(37, 99, 235, 0.45);
    }

    .olms-auth-footer-text {
        font-size: 0.86rem;
        color: #6b7280;
    }

    .olms-auth-footer-text a {
        font-weight: 500;
        color: #4f46e5;
        text-decoration: none;
    }

    .olms-auth-footer-text a:hover {
        text-decoration: underline;
    }

    .olms-auth-floating-icon {
        position: absolute;
        right: 12px;
        bottom: 10px;
        font-size: 0.7rem;
        opacity: 0.85;
        color: rgba(15, 23, 42, 0.6);
    }

    @media (max-width: 576px) {
        .olms-auth-wrapper {
            min-height: calc(100vh - 150px);
        }

        .olms-auth-body {
            padding: 18px 16px 18px;
        }
    }
</style>

<div class="olms-auth-wrapper">
    <div class="col-md-4 col-sm-10">
        <div class="card olms-auth-card">
            <div class="olms-auth-header text-white text-center">
                <h4 class="mb-1">Welcome Back</h4>
                <div class="olms-auth-subtitle">
                    Sign in to continue learning with OLMS
                </div>
            </div>
            <div class="olms-auth-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.non_field_errors }}
                    <div class="mb-3">
                        <label class="olms-form-label">{{ form.username.label }}</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        <label class="olms-form-label">{{ form.password.label }}</label>
                        {{ form.password }}
                    </div>
                    <button type="submit" class="btn olms-auth-btn w-100">Login</button>
                </form>
                <p class="mt-3 text-center olms-auth-footer-text">
                    No account?
                    <a href="{% url 'accounts:register' %}">Create one now</a>.
                </p>
                <div class="olms-auth-floating-icon">
                    OLMS • Secure Login
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
